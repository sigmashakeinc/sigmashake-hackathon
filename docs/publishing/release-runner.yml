name: sigmashake-hackathon

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - run: npm ci --ignore-scripts
      - run: npm run check
      - run: scripts/go-test-gate.sh services/api-go/internal/domain services/api-go/internal/httpapi services/api-go/internal/supervisor tools/hackctl/internal/syncstate

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: check
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - run: npm ci --ignore-scripts
      - run: npm --workspace apps/web run build
      - run: go run ./tools/hackctl/cmd/hackctl cf deploy --project web --env production
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_WEB_SCRIPT: ${{ vars.CLOUDFLARE_WEB_SCRIPT }}
          CLOUDFLARE_API_SCRIPT: ${{ vars.CLOUDFLARE_API_SCRIPT }}
          CLOUDFLARE_WEB_HOSTNAME: ${{ vars.CLOUDFLARE_WEB_HOSTNAME || 'hack.sigmashake.com' }}
          CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_ZONE_NAME: ${{ vars.CLOUDFLARE_ZONE_NAME || 'sigmashake.com' }}
          CLOUDFLARE_ENABLE_WORKERS_DEV: ${{ vars.CLOUDFLARE_ENABLE_WORKERS_DEV || 'true' }}
          CLOUDFLARE_WORKERS_DEV_PREVIEWS: ${{ vars.CLOUDFLARE_WORKERS_DEV_PREVIEWS || 'true' }}
